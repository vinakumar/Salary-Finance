name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore FullStack.ApiClientGen.sln

      - name: Build
        run: dotnet build FullStack.ApiClientGen.sln -c Release --no-restore

      - name: Test with coverage
        run: dotnet test FullStack.ApiClientGen.sln -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Verify formatting
        run: dotnet format FullStack.ApiClientGen.sln --verify-no-changes

  frontend:
    name: Frontend (Angular 18)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/FullStack.UI
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/FullStack.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint

      - name: Format check
        run: npm run format:check

      - name: Build production
        run: npx ng build --configuration production

      - name: Unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: src/FullStack.UI/coverage
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/FullStack.UI/package-lock.json

      - name: Restore .NET
        run: dotnet restore FullStack.ApiClientGen.sln

      - name: Build API
        run: dotnet build src/FullStack.Api -c Release --no-restore

      - name: Install frontend dependencies
        working-directory: src/FullStack.UI
        run: npm ci

      - name: Install Playwright
        working-directory: tests/FullStack.UI.E2ETests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start API in background
        run: |
          dotnet run --project src/FullStack.Api -c Release --urls "https://localhost:5001" &
        env:
          ASPNETCORE_ENVIRONMENT: Development

      - name: Start Angular in background
        working-directory: src/FullStack.UI
        run: npx ng serve --port 4200 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4200 --timeout 60000
          npx wait-on https://localhost:5001/health --timeout 60000 --httpTimeout 5000 --strictSSL=false

      - name: Run Playwright tests
        working-directory: tests/FullStack.UI.E2ETests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/FullStack.UI.E2ETests/playwright-report/
          retention-days: 14
